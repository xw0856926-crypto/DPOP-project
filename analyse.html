<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyse</title>
  <link rel="stylesheet" href="analyse.css" />
</head>
<body>

  <div class="stage">

    <!-- 背景 -->
    <img class="analyse-bg" src="assets/image/analyse/analyse_bg.png" alt="Analyse Background" />

    <!-- 左侧三个槽位（加 v1 / v2 / v3 方便分别调位置和大小） -->
    <div class="voice-area">

      <div class="voice-slot v1" data-voice="1">
        <img class="voice-img" src="assets/image/analyse/voice1_idle.png" draggable="true" alt="Voice 01" />
      </div>

      <div class="voice-slot v2" data-voice="2">
        <img class="voice-img" src="assets/image/analyse/voice2_idle.png" draggable="true" alt="Voice 02" />
      </div>

      <div class="voice-slot v3" data-voice="3">
        <img class="voice-img" src="assets/image/analyse/voice3_idle.png" draggable="true" alt="Voice 03" />
      </div>

    </div>

    <!-- 右侧分析区域（drop 热区 + 显示 drop/finished + 波浪线） -->
    <div id="dropZone" class="drop-zone" aria-label="Drop zone">

      <!-- ✅ 右侧凹槽底图（默认显示） -->
      <img id="rightSlot" class="right-slot" src="assets/image/analyse/right_slot.png" alt="slot" />

      <!-- ✅ 提示文字（默认显示） -->
      <div id="dropHint" class="drop-hint">
        Drag in the audio file,<br>
        start the analysis and conversion process.
      </div>

      <!-- ✅ 放大的卡片（默认隐藏，拖拽后显示） -->
      <img id="dropDisplay" alt="Dropped voice card" />

      <!-- ✅ 波浪线 -->
      <!-- 右侧分析区域 -->
      <div id="dropZone" class="drop-zone">
        <img id="dropDisplay" />
        <div id="scanLine" class="scan-line" aria-hidden="true"></div>
        <div id="analyseStatus" class="analyse-status">ANALYSING</div>

        <!-- ✅ 动态波浪线（内联 SVG，JS 会驱动它） -->
        <svg id="wave" class="wave" viewBox="0 0 556 124" preserveAspectRatio="xMidYMid meet" aria-hidden="true">

    </div>
  </div>

  <!-- ✅ BGM -->
  <audio id="bgmAmbient" src="assets/audio/ambient-loop.mp3" preload="auto" loop></audio>
  <audio id="bgmGlitch" src="assets/audio/glitch.mp3" preload="auto" loop></audio>

  <!-- ✅ 结果出现时播放的人声 -->
  <audio id="humanVoice1" src="assets/audio/human-voice1.mp3" preload="auto"></audio>
  <audio id="humanVoice2" src="assets/audio/human-voice2.mp3" preload="auto"></audio>
