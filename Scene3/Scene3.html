<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scene3</title>
  <link rel="stylesheet" href="./sene3.css" />
</head>
<body>
  <div id="viewport">
    <div id="stage">
      <div id="glitchOverlay"></div>
      
      <img
        id="bg"
        src="./assets/images/scene3-bg.png"
        alt="Scene3 Background"
      />

      <div id="coreGlow"></div>
      <img id="mapFill" src="./assets/images/map-fill.png" alt="Map Fill" />
      <img id="mapOutline" src="./assets/images/map-outline.png" alt="Map Outline" />

      <div id="mapText">
        [The number of natural persons is determined to meet the maximum supply of existing resources.]
     </div>

      <!-- 右侧面板 -->
      <div id="memoryPanel">
        <img
          id="panelBg"
          src="./assets/images/collect-progress-panel.png"
          alt="Collect Progress Panel"
        />

        <!-- voice -->
        <div class="memory-block" id="voiceBlock">
          <div class="progress-track voice-track">
            <div class="progress-fill" id="voiceProgressFill"></div>
          </div>
          <div class="progress-num voice-num" id="voiceProgressNum">0%</div>

          <div class="memory-item voice-item-1"><span class="check"></span></div>
          <div class="memory-item voice-item-2"><span class="check"></span></div>
          <div class="memory-item voice-item-3"><span class="check"></span></div>
        </div>

        <!-- image -->
        <div class="memory-block" id="imageBlock">
          <div class="progress-track image-track">
            <div class="progress-fill" id="imageProgressFill"></div>
          </div>
          <div class="progress-num image-num" id="imageProgressNum">0%</div>

          <div class="memory-item image-item-1"><span class="check"></span></div>
          <div class="memory-item image-item-2"><span class="check"></span></div>
          <div class="memory-item image-item-3"><span class="check"></span></div>
        </div>

        <!-- total -->
        <div class="memory-block" id="totalBlock">
          <div class="progress-track total-track">
            <div class="progress-fill" id="totalProgressFill"></div>
          </div>
          <div class="progress-num total-num" id="totalProgressNum">0%</div>

          <div class="memory-item total-item-1"><span class="check"></span></div>
          <div class="memory-item total-item-2"><span class="check"></span></div>
        </div>
      </div>

      <!-- 地图点击热区 -->
      <div id="mapHotspot"></div>

      <!-- 黑色遮罩 + 中间弹框 -->
      <div id="memoryOverlay">
       <div id="memoryDialog">
         <img
           id="memoryDialogBg"
           src="./assets/images/memoryDialog frame.png"
           alt="Dialog Frame"
         />

         <div id="memoryDialogContent">
           <div class="memory-line" id="memoryLine1">Memory module activated</div>
           <div class="memory-line" id="memoryLine2">Reconstructing identity...</div>
           <div class="memory-line" id="memoryLine3">Loading personal data...</div>
         </div>
       </div>
     </div>
    </div>
  </div>

  <script src="./scene3.js"></script>
</body>
</html>
